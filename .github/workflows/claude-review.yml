name: Claude PR Review

# Manually-triggered code review. Claude reviews a PR only when a
# repo maintainer adds the `needs-review` label. Outside contributors
# cannot self-trigger — only people with write access to the repo can
# apply labels, so the trigger is gated to maintainers by definition.
#
# Path filter excludes pure-docs PRs (CHANGELOG, README, *.md outside
# Python skills) so an accidental label on a docs-only PR doesn't
# burn API budget. Override by also touching a code path or by
# removing the label and re-applying after the path filter check.
#
# Setup (already done on this repo):
#   - ANTHROPIC_API_KEY repo secret
#   - `needs-review` label
#   - Claude GitHub App installed on the repo
#
# Cost characteristics (Sonnet, --max-turns 25, focused-diff prompt):
#   ~$0.20–0.50 per review, 2–5 minutes runtime, depending on diff size.
#   Hard turn cap prevents runaway exploration on small PRs.

on:
  pull_request_target:
    types: [labeled]
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'skills/**/*.py'
      - '.github/workflows/**'

# Cancel earlier runs if a new label triggers another review on the
# same PR (e.g. label removed and re-applied).
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Only fire when the label that was *just added* is `needs-review`.
    # Any other label addition is a no-op for this workflow.
    if: github.event.label.name == 'needs-review'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # --max-turns 25 is the cost cap. The earlier uncapped run
          # took 39 turns on an 11-line CHANGELOG diff, mostly spent
          # exploring repo files Claude didn't need. 25 leaves room
          # for a thoughtful review of substantive code PRs while
          # capping the worst case.
          claude_args: '--allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)" --max-turns 25'
          prompt: |
            You are reviewing a pull request for **GEO Reporter**, a
            Claude Code skill for Generative Engine Optimization audits.

            **Stay focused on the diff.** A maintainer has already vetted
            that this PR is worth your time — don't re-litigate scope.
            Only read files outside the diff if a specific finding
            requires context. Spend turns on substantive issues, not
            repo exploration.

            Focus your review, in priority order:

            1. **Security** — SSRF, RCE, command injection, hardcoded
               secrets, unsafe deserialization. Especially look at any
               `requests.get()` / `subprocess` / `eval` / `exec` calls.
            2. **Correctness** — does the change do what the PR title
               and description claim? Any obvious off-by-one, wrong
               default, or missing edge case?
            3. **Test coverage** — if Python code changed in `scripts/`,
               are there matching tests in `tests/`?
            4. **Skill / agent integrity** — for changes in
               `skills/*/SKILL.md` or `agents/*.md`, verify front-matter
               (`name`, `description`, `allowed-tools`) is consistent
               with the directory and intent. References to other
               skills must resolve to real directories.
            5. **Style consistency** — match surrounding code; flag
               unnecessary abstractions or speculative generality.

            **Skip the trivial.** Don't flag minor formatting, missing
            full-stops in comments, or stylistic preferences that don't
            affect correctness. The maintainer wants substantive
            findings, not a code-style audit.

            **How to post the review:**
            - Use `mcp__github_inline_comment__create_inline_comment`
              with `confirmed: true` for every line-specific finding.
            - At the end, post one summary comment via
              `gh pr comment <number> --body "..."`. Keep it short —
              the verdict (approve / request changes / questions) plus
              any cross-cutting concerns. If the PR is clean, the
              summary is a single line.
            - For a HIGH or CRITICAL severity security issue, label it
              explicitly in the inline comment so the maintainer can
              prioritise.
