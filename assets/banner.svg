<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a87c"/>
      <stop offset="50%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#e8a87c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bg)" rx="8"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="280" x2="900" y2="280"/>
    <line x1="100" y1="0" x2="100" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="500" y1="0" x2="500" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="700" y1="0" x2="700" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
  </g>

  <!-- Block letter "GEO" - row 1 -->
  <g fill="url(#textGrad)">
    <!-- G -->
    <rect x="40" y="35" width="16" height="16" rx="2"/>
    <rect x="56" y="35" width="16" height="16" rx="2"/>
    <rect x="72" y="35" width="16" height="16" rx="2"/>
    <rect x="88" y="35" width="16" height="16" rx="2"/>
    <rect x="40" y="51" width="16" height="16" rx="2"/>
    <rect x="40" y="67" width="16" height="16" rx="2"/>
    <rect x="40" y="83" width="16" height="16" rx="2"/>
    <rect x="56" y="83" width="16" height="16" rx="2"/>
    <rect x="72" y="83" width="16" height="16" rx="2"/>
    <rect x="88" y="83" width="16" height="16" rx="2"/>
    <rect x="88" y="67" width="16" height="16" rx="2"/>
    <rect x="72" y="67" width="16" height="16" rx="2"/>
    <rect x="40" y="99" width="16" height="16" rx="2"/>
    <rect x="56" y="99" width="16" height="16" rx="2"/>
    <rect x="72" y="99" width="16" height="16" rx="2"/>
    <rect x="88" y="99" width="16" height="16" rx="2"/>

    <!-- E -->
    <rect x="115" y="35" width="16" height="16" rx="2"/>
    <rect x="131" y="35" width="16" height="16" rx="2"/>
    <rect x="147" y="35" width="16" height="16" rx="2"/>
    <rect x="163" y="35" width="16" height="16" rx="2"/>
    <rect x="115" y="51" width="16" height="16" rx="2"/>
    <rect x="115" y="67" width="16" height="16" rx="2"/>
    <rect x="131" y="67" width="16" height="16" rx="2"/>
    <rect x="147" y="67" width="16" height="16" rx="2"/>
    <rect x="115" y="83" width="16" height="16" rx="2"/>
    <rect x="115" y="99" width="16" height="16" rx="2"/>
    <rect x="131" y="99" width="16" height="16" rx="2"/>
    <rect x="147" y="99" width="16" height="16" rx="2"/>
    <rect x="163" y="99" width="16" height="16" rx="2"/>

    <!-- O -->
    <rect x="190" y="35" width="16" height="16" rx="2"/>
    <rect x="206" y="35" width="16" height="16" rx="2"/>
    <rect x="222" y="35" width="16" height="16" rx="2"/>
    <rect x="238" y="35" width="16" height="16" rx="2"/>
    <rect x="190" y="51" width="16" height="16" rx="2"/>
    <rect x="238" y="51" width="16" height="16" rx="2"/>
    <rect x="190" y="67" width="16" height="16" rx="2"/>
    <rect x="238" y="67" width="16" height="16" rx="2"/>
    <rect x="190" y="83" width="16" height="16" rx="2"/>
    <rect x="238" y="83" width="16" height="16" rx="2"/>
    <rect x="190" y="99" width="16" height="16" rx="2"/>
    <rect x="206" y="99" width="16" height="16" rx="2"/>
    <rect x="222" y="99" width="16" height="16" rx="2"/>
    <rect x="238" y="99" width="16" height="16" rx="2"/>
  </g>

  <!-- "REPORTER" wordmark — row 2 -->
  <text x="40" y="195" font-family="'Courier New', monospace" font-size="68" font-weight="bold"
        fill="url(#textGrad)" letter-spacing="2">REPORTER</text>

  <!-- Accent line under wordmark -->
  <rect x="40" y="222" width="380" height="3" fill="url(#accent)" rx="1"/>

  <!-- Subtitle -->
  <text x="40" y="250" font-family="'Courier New', monospace" font-size="15" fill="#8892b0" letter-spacing="0.5">AI-Powered GEO Analysis</text>

  <!-- "for Claude Code" line -->
  <text x="40" y="272" font-family="'Courier New', monospace" font-size="13" fill="#636e72" letter-spacing="0.5">for Claude Code</text>

  <!-- Vertical accent line separating left and right -->
  <rect x="480" y="40" width="2" height="230" fill="#0f3460" opacity="0.4" rx="1"/>

  <!-- Right side: Commands list — each line is a single text element -->
  <g font-family="'Courier New', monospace" font-size="14" text-anchor="end">
    <text x="855" y="60"><tspan fill="#e94560">/audit </tspan><tspan fill="#636e72">&lt;url&gt;</tspan></text>
    <text x="855" y="88"><tspan fill="#e94560">/crawlers </tspan><tspan fill="#636e72">&lt;url&gt;</tspan></text>
    <text x="855" y="116"><tspan fill="#e94560">/citability </tspan><tspan fill="#636e72">&lt;url&gt;</tspan></text>
    <text x="855" y="144"><tspan fill="#e94560">/schema </tspan><tspan fill="#636e72">&lt;url&gt;</tspan></text>
    <text x="855" y="172"><tspan fill="#e94560">/brands </tspan><tspan fill="#636e72">&lt;url&gt;</tspan></text>
    <text x="855" y="200"><tspan fill="#e94560">/platforms </tspan><tspan fill="#636e72">&lt;url&gt;</tspan></text>
    <text x="855" y="228"><tspan fill="#e94560">/report </tspan><tspan fill="#636e72">&lt;url&gt;</tspan></text>
    <text x="855" y="256"><tspan fill="#e94560">/report-pdf</tspan></text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="295" width="900" height="25" fill="#0f3460" opacity="0.3"/>
  <text x="450" y="312" font-family="'Courier New', monospace" font-size="11" fill="#636e72" text-anchor="middle" letter-spacing="1">11 skills  ·  5 parallel agents  ·  6 schema templates  ·  PDF reports</text>
</svg>
